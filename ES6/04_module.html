<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>module</title>

    <!-- 모듈 : 다른 JS파일에 있는 함수/변수/클래스 등을 가져다 사용하는 기법 -->
    <!-- 이 모듈 기능은 2가지 조건에서 구동 됨 : -->
    <!-- 조건1. 서버 화경에서 구동 가능 -->
    <!-- 조건2. module type임을 속석으로 명시해야함 -->

    <!-- 리액트 환경은 기본적으로 이 2가지 조건이 마련된 프로젝트 구조임 -->
    <script type="module">
        //별도 js에 있는 show 함수를 불러와서 사용해보기..
        // import show from './aa.js'; //export default 되어야 가져올 수 있음

        // export default 아닌 녀석은 import 할때는 .. {} 필요
        // import {output, name, age as a} from './aa.js';

        // 한줄에 한번에 쓰기
        import show, {output, name, age as a} from './aa.js';

        // import한 함수를 호출해보기
        show();
        output();
        //document.write(name+", "+age+"<br>");
        alert(name+"\n"+a);
    </script>

</head>
<body>
    
</body>
</html>
